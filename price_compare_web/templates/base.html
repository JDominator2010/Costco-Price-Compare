<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Grocery Price Compare{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            costco:  '#005DAA',
            walmart: '#0071CE',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/" class="flex items-center gap-2 no-underline">
        <span class="text-2xl">🛒</span>
        <span class="font-bold text-lg text-gray-900 leading-tight">Price<span class="text-blue-600">Compare</span></span>
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-gray-400 py-6">
    Local tool · No data shared · Walmart prices scraped live
  </footer>
</body>
</html>
